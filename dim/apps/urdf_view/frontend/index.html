<!doctype html>
<!--
  URDF View — view & edit a URDF's frame tree (axis triads + kinematic links).
  Ported from the `urdf-view` CLI into a self-contained dashboard app: load a
  URDF from disk (no server), click/drag frames, edit origins, add/remove frames
  in the tree, and download the modified URDF.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>URDF View</title>
<link rel="stylesheet" href="/assets/theme.css" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  #app { position: absolute; inset: 44px 0 0 0; background: #0b0f14; }
  #app canvas { display: block; }

  /* top toolbar */
  .toolbar { position: absolute; top: 0; left: 0; right: 0; height: 44px; z-index: 5;
    display: flex; align-items: center; gap: 10px; padding: 0 14px;
    border-bottom: 1px solid var(--border); background: var(--card); }
  .toolbar .title { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }
  .toolbar .fname { font-family: var(--mono); font-size: 12px; color: var(--muted-fg); }
  .toolbar .spacer { flex: 1; }

  .hud { position: absolute; bottom: 12px; left: 12px; pointer-events: none; z-index: 4;
    font-family: var(--mono); font-size: 11px; line-height: 1.5; color: var(--muted-fg); white-space: pre; }

  .pane { position: absolute; z-index: 4; background: color-mix(in oklch, var(--card) 94%, transparent);
    border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
    backdrop-filter: blur(6px); font-size: 12px; }
  .pane h2 { margin: 0 0 8px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-fg); }

  #tree { top: 56px; left: 12px; width: 210px; max-height: calc(100% - 130px); overflow: auto; padding: 10px 8px; }
  .treenode { display: flex; align-items: center; gap: 4px; padding: 3px 6px; border-radius: var(--radius-sm);
    cursor: pointer; white-space: nowrap; font-family: var(--mono); }
  .treenode:hover { background: var(--accent); }
  .treenode.sel { background: var(--primary); color: var(--primary-fg); }
  .treenode.nbr { color: color-mix(in oklch, var(--warn) 70%, var(--fg)); }
  .treenode .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .treenode .rm { opacity: 0; color: var(--danger); font-weight: 700; padding: 0 2px; }
  .treenode:hover .rm { opacity: 0.8; }
  .treenode .rm:hover { opacity: 1; }

  #panel { top: 56px; right: 12px; width: 248px; padding: 12px; }
  #selected { color: var(--fg); font-family: var(--mono); min-height: 16px; font-size: 13px; }
  #neighbors { margin: 6px 0 12px; color: var(--muted-fg); font-family: var(--mono); }
  .colhead { display: grid; grid-template-columns: 14px 1fr 1fr; gap: 6px; font-size: 9px; color: var(--muted-fg); margin-bottom: 2px; }
  .axisrow { display: grid; grid-template-columns: 14px 1fr 1fr; gap: 6px; align-items: center; margin: 4px 0; }
  .axisrow .x { color: #ff6b6b; } .axisrow .y { color: #5be37a; } .axisrow .z { color: #5aa9ff; }
  .numin { width: 100%; box-sizing: border-box; background: var(--card); color: var(--fg);
    border: 1px solid var(--input); border-radius: var(--radius-sm); padding: 4px 6px; font: inherit; font-size: 12px; }
  .numin:disabled { opacity: 0.4; }
  .numin:focus { outline: none; border-color: var(--ring); box-shadow: 0 0 0 2px var(--ring-soft); }
  .panel-btns { display: flex; gap: 8px; margin: 12px 0; }
  .panel-btns .dim-btn { flex: 1; }

  #thickness { bottom: 12px; right: 12px; padding: 6px 8px; display: flex; align-items: center; gap: 8px; }
  #thickness button { width: 26px; height: 26px; cursor: pointer; border: 1px solid var(--border);
    border-radius: var(--radius-sm); background: var(--card); color: var(--fg); font: inherit; font-size: 16px; }
  #thickness button:hover { background: var(--accent); }
  #thickness span { color: var(--muted-fg); }
</style>
<script type="importmap">
{ "imports": { "three": "https://esm.sh/three@0.160.0" } }
</script>
</head>
<body class="science">
<script>
  (function () { const m = matchMedia("(prefers-color-scheme: light)"); const a = () => document.body.classList.toggle("dark", !m.matches); a(); m.addEventListener("change", a) })()
</script>

<div class="toolbar">
  <label class="dim-btn sm" style="cursor:pointer">Load URDF<input id="urdf-file" type="file" accept=".urdf,.xml,application/xml" hidden /></label>
  <select id="recent" class="numin" style="width:auto;max-width:200px" title="recently saved URDFs">
    <option value="">Recent…</option>
  </select>
  <span class="fname" id="urdf-name">sample</span>
  <span class="spacer"></span>
  <span class="fname" id="save-status"></span>
  <button class="dim-btn sm" id="save">Save</button>
  <button class="dim-btn sm" id="download">Download URDF</button>
</div>

<div id="app"></div>
<div class="hud">wasd/qe: move · ijkl: look · drag: orbit
click frame: connections · drag a basis arrow: move axis · ctrl/⌘+z: undo</div>

<div class="pane" id="tree"><h2>Frames (<span id="frame-count">0</span>)</h2><div id="tree-list"></div></div>

<div class="pane" id="panel">
  <h2>Selected Frame</h2>
  <div id="selected">(none)</div>
  <div id="neighbors"></div>
  <div class="panel-btns">
    <button class="dim-btn sm" id="add-child" disabled>+ child</button>
    <button class="dim-btn sm danger" id="remove-frame" disabled>− remove</button>
  </div>
  <div class="colhead"><span></span><span>pos (m)</span><span>angle (°)</span></div>
  <div class="axisrow"><span class="x">x</span><input id="px" class="numin" type="number" step="0.01" disabled><input id="rx" class="numin" type="number" step="1" disabled></div>
  <div class="axisrow"><span class="y">y</span><input id="py" class="numin" type="number" step="0.01" disabled><input id="ry" class="numin" type="number" step="1" disabled></div>
  <div class="axisrow"><span class="z">z</span><input id="pz" class="numin" type="number" step="0.01" disabled><input id="rz" class="numin" type="number" step="1" disabled></div>
</div>

<div class="pane" id="thickness">
  <button id="thinner" title="smaller arrows">−</button><span>arrows</span><button id="thicker" title="bigger arrows">+</button>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
