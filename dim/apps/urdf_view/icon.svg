<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="URDF View">
  <!-- origin -->
  <circle cx="26" cy="40" r="3.5" fill="#cfe8f2"/>
  <!-- z up (blue) -->
  <path d="M26 40 L26 14" stroke="#5aa9ff" stroke-width="3" stroke-linecap="round"/>
  <path d="M26 14 l-3.2 5 h6.4 z" fill="#5aa9ff"/>
  <!-- x right-down (red) -->
  <path d="M26 40 L50 50" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
  <path d="M50 50 l-5.8 -0.6 l2.4 5.3 z" fill="#ff6b6b"/>
  <!-- y left-down (green) -->
  <path d="M26 40 L8 50" stroke="#5be37a" stroke-width="3" stroke-linecap="round"/>
  <path d="M8 50 l5.8 -0.6 l-2.4 5.3 z" fill="#5be37a"/>
  <!-- a connected child frame node -->
  <circle cx="50" cy="50" r="2.6" fill="#7f97ab"/>
</svg>
